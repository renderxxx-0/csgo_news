<!DOCTYPE html>
<html>
<body>

<h2>News Admin</h2>

<input id="title" placeholder="title"><br>
<input id="desc" placeholder="desc"><br>
<input id="img" placeholder="image url"><br>

<button onclick="post()">POST</button>

<hr>
<div id="list"></div>

<script>

const API = "https://YOUR-RENDER.onrender.com";

async function load()
{
    const r = await fetch(API + "/rss.json");
    const d = await r.json();

    list.innerHTML = d.items.map(n =>
        `<div>
            <b>${n.title}</b>
            <button onclick="del(${n.id})">X</button>
        </div>`
    ).join("");
}

async function post()
{
    await fetch(API + "/news", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            title: title.value,
            description: desc.value,
            imageUrl: img.value
        })
    });

    load();
}

async function del(id)
{
    await fetch(API + "/news/" + id, { method: "DELETE" });
    load();
}

load();

</script>

</body>
</html>
